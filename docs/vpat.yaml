chapters:
  success_criteria_level_a:
    notes: ''
    disabled: false
    criteria:
      - num: 1.1.1
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >-
                Graphs and charts used for statistics (e.g., Monographs,
                Preprints) lack text alternatives, rendering data points
                inaccessible to screen reader users. Small action icons (edit,
                delete, view) often lack descriptive labels, forcing reliance on
                visual cues alone. Broken links and missing href attributes were
                also identified.


                Platforms: OJS, OPS, OMP


                All open WCAG 1.1.1 issue(s): 

                [12596](https://github.com/pkp/pkp-lib/issues/12596),

                [12649](https://github.com/pkp/pkp-lib/issues/12649)
          - name: electronic-docs
            adherence:
              level: not-applicable
              notes: ''
          - name: software
            adherence:
              level: supports
              notes: >-
                Data structures expose values correctly when properly labeled in
                the UI layer.
          - name: authoring-tool
            adherence:
              level: partially-supports
              notes: >-
                Authors and editors interacting with submission metadata,
                announcements, and editorial guidance encounter unlabeled action
                icons (edit, delete, view) and inaccessible statistical graphs.
                These barriers affect content production workflows where authors
                upload files and editors manage publication assets.
      - num: 1.2.1
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Audio-only media content is not present in the administrative
                interfaces.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: not-applicable
              notes: No audio-only media authoring in Editorial View interfaces.
      - num: 1.2.2
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Video content without audio transcripts are not commonly present
                in admin interfaces.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: not-applicable
              notes: No video captioning workflows in Editorial View.
      - num: 1.2.3
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Media synchronization alternatives are not required for admin
                workflow interfaces.
          - name: electronic-docs
            adherence:
