                Platforms: OMP, OJS, OPS


                All open WCAG 2.1.1 issue(s): 

                [12601](https://github.com/pkp/pkp-lib/issues/12601),

                [12681](https://github.com/pkp/pkp-lib/issues/12681),

                [12838](https://github.com/pkp/pkp-lib/issues/12838) 
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: partially-supports
              notes: >-
