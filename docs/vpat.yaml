              notes: No media synchronization in authoring workflows.
      - num: 1.3.1
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >-
                Critical structural failures exist in table semantics and form
                labeling. Table headers frequently misuse the scope attribute on
                data cells instead of header cells. Rich text editors (used for
                Author Guidance, Announcements) are unreadable by screen
                readers, often labeled only as "clickable application" without
                exposing content. Filter controls behave incorrectly, and
                navigation submenus fail to announce their expandable state or
                auto-expand confusingly. Duplicate headings and improper heading
                hierarchies are prevalent.


                Platforms: OJS, OPS, OMP


                All open WCAG 1.3.1 issue(s): 

                [9355](https://github.com/pkp/pkp-lib/issues/9355),

                [9357](https://github.com/pkp/pkp-lib/issues/9357),

                [12467](https://github.com/pkp/pkp-lib/issues/12467),

                [12839](https://github.com/pkp/pkp-lib/issues/12839)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: supports
              notes: >-
                Backend data structures maintain proper relationships when
                semantic markup is correctly implemented.
          - name: authoring-tool
            adherence:
              level: partially-supports
              notes: >-
                Rich text editors used for Author Guidance, Announcements, and
                editorial decisions are unreadable by screen readers, labeled
                only as "clickable application." This directly impedes content
                authors who rely on these editors to produce published material.
                Table semantics and form labeling failures also affect authoring
                contexts.
      - num: 1.3.2
        components:
          - name: web
            adherence:
              level: supports
              notes: Navigation order generally follows logical visual flow.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: supports
              notes: Navigation order follows logical flow for authoring tasks.
      - num: 1.3.3
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Buttons and breadcrumbs provide complementary text to screen
                reader users.
          - name: electronic-docs
            adherence:
