notes: >-
  OJS, OMP, and OPS are authoring platforms — authors submit manuscripts,
  editors compose announcements and editorial decisions, and reviewers
  contribute structured feedback. As such, the Authoring Tool Accessibility
  Guidelines (ATAG) 2.0 are relevant to a comprehensive accessibility evaluation
  of these products.


  This WCAG 2.1 conformance report evaluates the accessibility of content
  rendered and interacted with by end users, including authoring interfaces such
  as submission forms, rich text editors, and reviewer workflows. Where
  applicable, WCAG criteria in the tables below include authoring-tool component
  findings that overlap with ATAG Part B concerns — particularly around rich
  text editor operability (2.1.1), programmatic labels on editing fields
  (3.3.2), and content validation feedback (3.3.1).


  A separate ATAG 2.0 Part B assessment is planned as part of PKP's broader
  accessibility roadmap. This assessment will evaluate the platform's capacity
  to support authors in producing accessible content, including: guidance for
  non-text alternatives, heading structure preservation through the rich text
  editor, and accessibility-aware content transformation during import/export.
  Until that assessment is complete, ATAG conformance is not claimed.


  The Backend administrative interfaces audit found many barriers requiring
  remediation. While the frontend reader interface has some improvements, the
  admin interfaces remain critically non-compliant in several areas. If you
  encounter barriers, or need accommodations, please report them via the PKP
  accessibility report form: https://pkp.sfu.ca/accessibility-report/.
evaluation_methods_used: >
  ### Reviewer’s Testing Technologies


  * Mac Air 

  * iPhone 15 Pro 

  * iPhone 14 Pro 

  * Windows 10 and 11 laptops 

  * Apple Mac Mini (M1, 2020) 

  * iPad Pro 12.9” (5th Generation) 

  * Different accessibility related apps, plugins, extensions, as well as online
  checking software, were used in Chrome, Edge, Safari, and Firefox.


  ### Third Party Testers Testing Technologies


  * JAWS 2026 on Microsoft Edge on Windows 10 (updated February 2026) 

  * VoiceOver on Safari on iPhone 14, iOS 26 (updated February 2026) 

  * Screen Reader with Braille Device (Deaf-Blind) 

  * VoiceOver on Safari on iPhone 13 Pro, iOS 17.6.1 with Focus 14 Blue braille
  display (updated March 2025) 

  * Screen Reader with Braille Device 

  * JAWS 2022 on Google Chrome on Windows 11 Pro with Mantis braille display
  (updated February 2025) 

  * VoiceOver on Safari on iPhone 14 Pro, iOS 26.3 

  * Windows Narrator on Microsoft Edge on Windows 11 version 25H2 (up to date
  March 2026) 

  * NVDA 2025.3.3 on Google Chrome on Windows 11 version 25H2 (updated February
  2025) 

  * VoiceOver on Safari on iPad Pro 12.9" (5th Generation), iPadOS 26.3, Chrome
  with pinch-to-zoom and Dynamic Type enabled (19pt+ font) 

  * Safari on macOS 26.0.1 on Apple Mac Mini (M1, 2020) with 27" external
  monitor at 1280×720p, increased display contrast, and browser zoom (Ctrl +)


  ### Testers disabilities


  * Fully blind 

  * Deaf-Blind 

  * Almost fully blind (near fully blind) 

  * Low vision 

  * ADD 

  * Panic and anxiety disorders
