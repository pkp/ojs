title: OMP/OJS/OPS Editorial View Accessibility Conformance Report
product:
  name: OMP/OJS/OPS Editorial View
  version: '3.5'
  description: >-
    The Editorial View that ships with OJS, OMP, and OPS is designed to work
    great for a broad range of users. It employs a common, straightforward
    design style that should fit user needs and ensures the content is
    easy-to-access no matter what. This report covers the administrative
    (Editorial View) interfaces evaluated during the March 2026 accessibility
    audit.
