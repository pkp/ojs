    disabled: false
    criteria:
      - num: 1.2.4
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Live captions are not required as live streaming is not part of
                administrative workflows.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: not-applicable
              notes: No live streaming in authoring workflows.
      - num: 1.2.5
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Audio descriptions are not required as video content is minimal
                in admin interfaces.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: not-applicable
              notes: No video content requiring audio descriptions.
      - num: 1.3.4
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                The interface provides support for both portrait and landscape
                orientation across screen sizes.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: supports
              notes: Orientation support applies to authoring interfaces.
      - num: 1.3.5
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Input purpose is properly recognized and autofill-ready for
                common fields.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: supports
              notes: Autofill-ready fields benefit authoring forms.
      - num: 1.4.3
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >
                There are UI elements failing contrast requirements, including
                pink graph lines on dark blue backgrounds, blue text links
                blending into body text, and red warning banners that are too
                small or low contrast. Table text, search boxes against dark
                backgrounds, and notification bubbles are consistently too light
                or small to be legible.


                Platforms: OJS, OPS, OMP


                All open WCAG 1.4.3 issue(s): 

                [9333](https://github.com/pkp/pkp-lib/issues/9333),

                [9353](https://github.com/pkp/pkp-lib/issues/9353),

                [12650](https://github.com/pkp/pkp-lib/issues/12650)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: supports
              notes: >-
                Color selection logic renders correctly; contrast failures are
                CSS implementation issues.
          - name: authoring-tool
            adherence:
              level: supports
              notes: >-
                Content produced through admin interfaces inherits whatever
                contrast styling is applied.
      - num: 1.4.4
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >-
                Text throughout the administrative interface is frequently below
                the recommended 1rem size. This affects critical areas such as
                form labels, button text, table data, error messages, and
                warning banners.


                Platforms: OJS, OPS, OMP


                All open WCAG 1.4.4 issue(s): 

                [12710](https://github.com/pkp/pkp-lib/issues/12710),

                [12711](https://github.com/pkp/pkp-lib/issues/12711)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: supports
              notes: >-
                Font sizing is handled by browser typography engines; minimum
                size recommendations are not programmatically enforced.
          - name: authoring-tool
            adherence:
              level: supports
              notes: >-
                Text scaling works as expected through standard browser
                controls.
      - num: 1.4.5
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Buttons include both icons and text labels related to the
                actions they perform.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: supports
              notes: No images of text used in authoring interface buttons.
      - num: 1.4.10
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >
                The administrative interface is completely unusable at 200% and
                400% magnification. Content is pushed off-screen, scrolling is
                restricted in key views (e.g., "View Submission"), and layouts
                collapse requiring endless horizontal scrolling. On small
                screens (320px), submission pages and dashboard grids are
                rendered unusable.


                Platforms: OJS, OPS, OMP


                All open WCAG 1.4.10 issue(s): 

                [12559](https://github.com/pkp/pkp-lib/issues/12559)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: partially-supports
              notes: >-
                System layout rendering fails to adapt gracefully to high
                magnification levels. Responsive breakpoints need expansion.
          - name: authoring-tool
            adherence:
              level: supports
              notes: Content reflows appropriately within the viewport constraints.
      - num: 1.4.11
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Most icons utilize sufficient contrast ratios, though specific
                instances fall short.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 1.4.12
        components:
          - name: web
            adherence:
              level: supports
              notes: Text spacing does not block content when adjusted by users.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 1.4.13
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Hoverable content remains visible until dismissed; no accidental
                dismissals reported.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 2.4.5
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Multiple ways exist to navigate to administrative pages (main
                menu, breadcrumbs, dashboard links).
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 2.4.6
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >-
                Navigation labels are sometimes ambiguous and template
                configurations do not currently enforce inclusion of descriptive
                headings on dashboard landing pages.


                Platforms: OJS, OMP, OPS


                All open WCAG 2.4.6 issue(s): 

                [9342](https://github.com/pkp/pkp-lib/issues/9342),

                [9344](https://github.com/pkp/pkp-lib/issues/9344),

                [9346](https://github.com/pkp/pkp-lib/issues/9346),

                [9351](https://github.com/pkp/pkp-lib/issues/9351),

                [9356](https://github.com/pkp/pkp-lib/issues/9356),

                [9358](https://github.com/pkp/pkp-lib/issues/9358),

                [12727](https://github.com/pkp/pkp-lib/issues/12727)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: supports
              notes: >-
                Label generation logic is sound; templating inconsistencies
                require manual enforcement.
          - name: authoring-tool
            adherence:
              level: supports
              notes: >-
                Headings can be applied by content creators using available
                formatting options.
      - num: 2.4.7
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >-
                Focus indicators are inconsistent and sometimes invisible. Top
                account icon dropdown focus states are barely visible, and some
                interactive elements lack a clear focus ring entirely.


                Platforms: OMP, OJS, OPS


                All open WCAG 2.4.7 issue(s): 

                [12748](https://github.com/pkp/pkp-lib/issues/12748)
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: partially-supports
              notes: >-
                System focus management renders CSS styles that may not meet
                visibility thresholds for low-vision users.
          - name: authoring-tool
            adherence:
              level: supports
              notes: Focus indicators apply consistently to user-editable elements.
      - num: 3.1.2
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Language changes are properly communicated to assistive
                technologies.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 3.2.3
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Same navigation placement is maintained across all
                administrative pages.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 3.2.4
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                Consistent identification across multiple pages is maintained
                for repeating components.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 3.3.3
        components:
          - name: web
            adherence:
              level: partially-supports
              notes: >+
                When submitting forms, errors occur and the system provides
                minimal guidance on how to correct them. A generic "fill out
                this field" message is usually presented, but there are no
                actionable suggestions to help users resolve validation
                failures.


                Platforms: OMP, OJS, OPS

          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: partially-supports
              notes: >-
                Error suggestion logic is incomplete; additional context should
                be programmatically communicated alongside error messages.
          - name: authoring-tool
            adherence:
              level: partially-supports
              notes: >-
                Users editing content receive limited guidance when validation
                errors occur, potentially hindering correction efforts.
      - num: 3.3.4
        components:
          - name: web
            adherence:
              level: not-applicable
              notes: >-
                No financial transactions are processed on the administrative
                reader interface.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: ''
              notes: ''
      - num: 4.1.3
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Status messages are conveyed through roles and properties where
                programmatically determinable.
          - name: electronic-docs
            adherence:
              level: ''
              notes: ''
          - name: software
            adherence:
              level: ''
              notes: ''
          - name: authoring-tool
            adherence:
              level: supports
              notes: >-
                Status messages in authoring workflows are programmatically
                conveyed.
